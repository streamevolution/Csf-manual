<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado de Validación</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #F8F8F7; 
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-container {
            width: 100%;
            text-align: center;
            margin-top: 0;
            padding-top: 0; 
            margin-bottom: -15px; 
        }
        .logo-container img {
            max-width: 300px;
            height: auto;
        }
        .container {
            width: 100%;
            max-width: 650px; 
            padding: 0 15px 50px 15px; 
            box-sizing: border-box; 
        }
        
        /* Estilos del primer rectángulo del RFC */
        .rfc-rectangle {
            background-image: url('https://i.postimg.cc/VkmzG632/1772435835299.png');
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            background-position: center;
            margin-top: 30px; 
            width: calc(100% + 30px); 
            margin-left: -15px; 
            padding: 45px 30px 25px 38px; 
            margin-bottom: -10px; 
            font-size: 14.5px; 
            color: #333;
            box-sizing: border-box;
            text-align: left;
        }

        /* Estilos de las tarjetas (Cards) aplicadas como imagen de fondo */
        .card {
            background-image: url('https://i.postimg.cc/d1ryR3bg/1772436938445.png');
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            background-position: center;
            background-color: transparent; 
            border: none; 
            border-radius: 8px; 
            overflow: hidden;
            box-shadow: none; 
            box-sizing: border-box; 
            width: calc(100% + 30px); 
            margin-left: -15px; 
            margin-bottom: -4px; 
        }
        
        .card-header {
            background: transparent; 
            padding: 15px 20px 20px 33px; 
            font-size: 15.5px; 
            color: #4a3c31;
            /* MODIFICACIÓN: Para coincidir con el SAT, peso normal */
            font-weight: normal;
            border-bottom: none; 
        }
        
        .card-body {
            background: transparent; 
            padding: 0px 12px 45px 28px; 
        }
        
        /* Estilos de las filas de datos */
        .data-row {
            display: flex;
            justify-content: center; 
            padding: 2px 0; 
        }
        .data-label {
            /* --- AJUSTE: Letra menos negrita (peso normal) --- */
            font-weight: 400; /* Peso normal para coincidir con la imagen de referencia */
            /* -------------------------------------------------- */
            color: #333;
            width: 44%; 
            text-align: right;
            padding-right: 5px; 
            box-sizing: border-box;
            font-size: 13.5px; 
            line-height: 1.3; 
        }
        .data-value {
            color: #333; 
            width: 56%;
            text-align: left;
            padding-left: 0;
            word-break: break-word;
            text-transform: uppercase; 
            font-size: 13.5px; 
            line-height: 1.3; 
        }

        #datosContenedor .card:last-child {
            min-height: 320px; 
        }
    </style>
</head>
<body>

<div class="logo-container">
    <img src="https://i.postimg.cc/PJt6GWyR/HACIENDA-SAT.jpg" alt="Logo Hacienda SAT">
</div>

<div class="container">
    
    <div class="rfc-rectangle">
        El RFC: <span id="rfcValue"></span>, tiene asociada la siguiente información.
    </div>
    
    <div id="datosContenedor">
        </div>

</div>

<script>
    window.onload = function() {
        const parametros = new URLSearchParams(window.location.search);
        
        // Extraemos la CURP para simular el RFC en el texto superior (primeros 13 caracteres)
        let curpValue = parametros.get('curp') || 'NO ESPECIFICADO';
        let rfcGenerado = curpValue !== 'NO ESPECIFICADO' ? curpValue.substring(0, 13) : curpValue;
        document.getElementById('rfcValue').textContent = rfcGenerado;

        // Definimos los nombres a mostrar para cada ID
        const nombresCampos = {
            curp: 'CURP:',
            nombre: 'Nombre:',
            apellidoPaterno: 'Apellido Paterno:',
            apellidoMaterno: 'Apellido Materno:',
            fechaNacimiento: 'Fecha Nacimiento:',
            fechaInicioOperaciones: 'Fecha de Inicio de operaciones:',
            situacionContribuyente: 'Situación del contribuyente:',
            fechaUltimoCambio: 'Fecha del último cambio de situación:',
            entidadFederativa: 'Entidad Federativa:',
            municipioDelegacion: 'Municipio o delegación:',
            colonia: 'Colonia:',
            tipoVialidad: 'Tipo de vialidad:',
            nombreVialidad: 'Nombre de la vialidad:',
            numeroExterior: 'Número exterior:',
            cp: 'CP:',
            correoElectronico: 'Correo electrónico:',
            al: 'AL:',
            regimen: 'Régimen:',
            fechaAlta: 'Fecha de Alta:'
        };

        // Estructuramos en los 3 grupos que aparecen en tus imágenes
        const grupos = [
            {
                titulo: 'Datos de Identificación',
                campos: ['curp', 'nombre', 'apellidoPaterno', 'apellidoMaterno', 'fechaNacimiento', 'fechaInicioOperaciones', 'situacionContribuyente', 'fechaUltimoCambio']
            },
            {
                titulo: 'Datos de Ubicación (domicilio fiscal, vigente)',
                campos: ['entidadFederativa', 'municipioDelegacion', 'colonia', 'tipoVialidad', 'nombreVialidad', 'numeroExterior', 'cp', 'correoElectronico', 'al']
            },
            {
                titulo: 'Características fiscales (vigente)',
                campos: ['regimen', 'fechaAlta']
            }
        ];

        const contenedor = document.getElementById('datosContenedor');

        // Generamos el HTML respetando el diseño de las tarjetas
        grupos.forEach(grupo => {
            const divCard = document.createElement('div');
            divCard.className = 'card';

            const divHeader = document.createElement('div');
            divHeader.className = 'card-header';
            divHeader.textContent = grupo.titulo;
            divCard.appendChild(divHeader);

            const divBody = document.createElement('div');
            divBody.className = 'card-body';

            grupo.campos.forEach(idCampo => {
                const valor = parametros.get(idCampo) || ''; 
                
                const divRow = document.createElement('div');
                divRow.className = 'data-row';
                
                const divLabel = document.createElement('div');
                divLabel.className = 'data-label';
                divLabel.textContent = nombresCampos[idCampo];
                
                const divValue = document.createElement('div');
                divValue.className = 'data-value';
                divValue.textContent = valor;
                
                divRow.appendChild(divLabel);
                divRow.appendChild(divValue);
                divBody.appendChild(divRow);
            });

            divCard.appendChild(divBody);
            contenedor.appendChild(divCard);
        });
    }
</script>

</body>
</html>
